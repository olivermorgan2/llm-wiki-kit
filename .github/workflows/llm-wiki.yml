name: Cross-Surface Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        arch: [arm64, x86_64]
        exclude:
          - os: windows-latest
            arch: arm64
        include:
          - os: macos-latest
            arch: x86_64
          - os: ubuntu-latest
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build llm-wiki binary
        run: |
          GOOS=${{ matrix.os == 'windows-latest' && 'windows' || 'linux' }}
          GOARCH=${{ matrix.arch }}
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/llm-wiki-${{ matrix.os }}-${{ matrix.arch }} ./cmd/llm-wiki
      - name: Run parity test
        run: go test ./internal/parity
      - name: Upload failure details
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            .github/workflows/
            __debug.log