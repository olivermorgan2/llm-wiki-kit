name: Cross-Surface Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-latest
            arch: x86_64
          - os: ubuntu-latest
            arch: arm64
          - os: ubuntu-latest
            arch: x86_64
          - os: windows-latest
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build llm-wiki binary
        run: |
          echo "Building for ${{ matrix.os }}-${{ matrix.arch }}"
          GOOS=$(echo ${{ matrix.os }} | sed 's/macos/darwin/; s/ubuntu/linux/; s/windows/windows/')
          GOARCH=${{ matrix.arch }}
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/llm-wiki ./cmd/llm-wiki
      - name: Verify binary
        run: |
          test -f bin/llm-wiki
          ./bin/llm-wiki version
      - name: Run parity test
        run: go test -v ./internal/parity
      - name: Upload failure details
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            .github/
            bin/
            *.log